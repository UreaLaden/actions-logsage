name: LogSage
description: Analyze CI logs and surface the most likely root cause of failures
author: UreaLaden

branding:
  icon: activity
  color: orange

inputs:
  run:
    description: Shell command to execute. Output is captured and analyzed on failure. Takes precedence over log-file.
    required: false
  log-file:
    description: Path to captured CI output to analyze. Ignored when run is provided.
    required: false
  github-token:
    description: "GitHub token for posting PR comments. Requires pull-requests: write."
    required: false
    default: ${{ github.token }}
  post-comment:
    description: Set to 'false' to disable automatic PR comment posting.
    required: false
    default: 'true'
  version:
    description: LogSage version to install (e.g. 1.0.1). Defaults to latest.
    required: false
    default: latest

outputs:
  result:
    description: LogSage CI summary output
    value: ${{ steps.run-logsage.outputs.result }}
  result-file:
    description: Path to the file containing the full LogSage output
    value: ${{ steps.run-logsage.outputs.result-file }}

runs:
  using: composite
  steps:
    - name: Install LogSage
      shell: bash
      run: ${{ github.action_path }}/scripts/install.sh
      env:
        LOGSAGE_VERSION: ${{ inputs.version }}

    - name: Run LogSage
      id: run-logsage
      shell: bash
      run: ${{ github.action_path }}/scripts/run.sh
      env:
        LOGSAGE_RUN_CMD: ${{ inputs.run }}
        LOGSAGE_LOG_FILE: ${{ inputs.log-file }}
        LOGSAGE_OUTPUT_FILE: ${{ runner.temp }}/logsage-output.md

    - name: Post PR Comment
      if: always()
      shell: bash
      run: ${{ github.action_path }}/scripts/comment.sh
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LOGSAGE_RESULT_FILE: ${{ steps.run-logsage.outputs.result-file }}
        LOGSAGE_POST_COMMENT: ${{ inputs.post-comment }}
